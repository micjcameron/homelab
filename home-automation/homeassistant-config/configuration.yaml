
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

# Dashboards: existing UI dashboards (Central, Map) keep working as-is;
# this adds a repo-controlled YAML dashboard alongside them.
lovelace:
  mode: storage
  dashboards:
    wall-panel:
      mode: yaml
      title: Home
      icon: mdi:tablet-dashboard
      show_in_sidebar: true
      filename: dashboards/wall.yaml

sensor:
  - platform: afvalbeheer
    wastecollector: Avri
    resources:
      - restafval
      - gft
      - pmd
      - papier
    postcode: 4191LR
    streetnumber: 12
    upcomingsensor: 1
    dateformat: "%d-%m-%Y"
