
# Loads default set of integrations. Do not remove.
default_config:

# Trust the local Cloudflare Tunnel connector (cloudflared runs on the Pi in host
# network mode, so it reaches HA from 127.0.0.1). Fixes the 400 when proxied.
http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 127.0.0.1
    - ::1
  # Auto-ban an IP after repeated failed logins (real attacker IP, thanks to XFF).
  ip_ban_enabled: true
  login_attempts_threshold: 5

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

# Dashboards: existing UI dashboards (Central, Map) keep working as-is;
# this adds a repo-controlled YAML dashboard alongside them.
lovelace:
  mode: storage
  dashboards:
    wall-panel:
      mode: yaml
      title: Home
      icon: mdi:tablet-dashboard
      show_in_sidebar: true
      filename: dashboards/wall.yaml

sensor:
  - platform: afvalbeheer
    wastecollector: Avri
    resources:
      - restafval
      - gft
      - pmd
      - papier
    postcode: 4191LR
    streetnumber: 12
    upcomingsensor: 1
    dateformat: "%d-%m-%Y"
